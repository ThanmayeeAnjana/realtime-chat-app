<!DOCTYPE html>
<html>
<head>
    <title>Realtime Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">

    <h1>💬 Realtime Chat</h1>

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button id="signupBtn">
        Sign Up
    </button>

    <button id="loginBtn">
        Login
    </button>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
